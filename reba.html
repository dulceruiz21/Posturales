
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>App Evaluación REBA</title>

<style>


body{
font-family: Arial;
background:#f2f5ff;
margin:0;
padding:30px;
}

h1{
text-align:center;
color:#0d47a1;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.15);
}

.section{
margin-bottom:25px;
}

h2{
color:#1565c0;
border-bottom:2px solid #e3e8ff;
padding-bottom:5px;
}

label{
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border-radius:5px;
border:1px solid #ccc;
}

.volver{
display:inline-block;
margin:20px;
padding:10px 20px;
background:#34495e;
color:white;
text-decoration:none;
border-radius:6px;
font-weight:bold;
}

.volver:hover{
background:#2c3e50;
}

button{
padding:12px;
width:100%;
background:#1565c0;
color:white;
border:none;
font-size:16px;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#0d47a1;
}

.resultado{
margin-top:25px;
padding:20px;
background:#f5f7ff;
border-radius:8px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #ccc;
padding:10px;
text-align:center;
}

th{
background:#e8ecff;
}

.barra{
height:25px;
background:#ddd;
border-radius:10px;
margin-top:15px;
overflow:hidden;
}

.progreso{
height:25px;
width:0%;
background:red;
}

</style>
</head>

<body>
<a href="index.html" class="volver">⬅ Volver al menú</a>

<h1>Sistema de Evaluación Ergonómica REBA</h1>

<div class="container">

<div class="section">

<h2>Datos de Evaluación</h2>

<label>Tarea</label>
<input type="text" id="tarea">

<label>Evaluador</label>
<input type="text" id="evaluador">

<label>Fecha</label>
<input type="date" id="fecha">

</div>

<div class="section">

<h2>Postura del Cuerpo</h2>

<label>Cuello</label>
<select id="cuello">
<option value="1">Recto</option>
<option value="2">Flexión</option>
<option value="3">Flexión extrema</option>
</select>

<label>Tronco</label>
<select id="tronco">
<option value="1">Recto</option>
<option value="2">Inclinado</option>
<option value="3">Muy inclinado</option>
<option value="4">Extremadamente inclinado</option>
</select>

<label>Piernas</label>
<select id="piernas">
<option value="1">Estables</option>
<option value="2">Flexionadas</option>
<option value="3">Inestables</option>
</select>

</div>

<div class="section">

<h2>Extremidades Superiores</h2>

<label>Brazo superior</label>
<select id="brazoSup">
<option value="1">0° - 20°</option>
<option value="2">20° - 45°</option>
<option value="3">45° - 90°</option>
<option value="4">Más de 90°</option>
</select>

<label>Brazo inferior</label>
<select id="brazoInf">
<option value="1">60° - 100°</option>
<option value="2">Menos de 60°</option>
<option value="2">Más de 100°</option>
</select>

<label>Muñeca</label>
<select id="muneca">
<option value="1">Neutral</option>
<option value="2">Flexión</option>
<option value="3">Flexión severa</option>
</select>

</div>

<div class="section">

<h2>Carga y Actividad</h2>

<label>Carga manipulada</label>
<select id="carga">
<option value="0">Menos de 5 kg</option>
<option value="1">5 - 10 kg</option>
<option value="2">Más de 10 kg</option>
</select>

<label>Actividad</label>
<select id="actividad">
<option value="0">Normal</option>
<option value="1">Repetitiva</option>
<option value="2">Postura mantenida</option>
<option value="3">Muy repetitiva</option>
</select>

</div>

<button onclick="calcularREBA()">Calcular Evaluación</button>


<div class="resultado" id="resultado"></div>

<div class="barra">
<div class="progreso" id="barraRiesgo"></div>
</div>

<table id="tablaResumen" style="display:none;">
<tr>
<th>Score A</th>
<th>Score B</th>
<th>Score C</th>
<th>REBA Final</th>
<th>Nivel de Riesgo</th>
</tr>
<tr>
<td id="a"></td>
<td id="b"></td>
<td id="c"></td>
<td id="r"></td>
<td id="nivel"></td>
</tr>
</table>

</div>

<script>

function calcularREBA(){

let tarea=document.getElementById("tarea").value
let evaluador=document.getElementById("evaluador").value
let fecha=document.getElementById("fecha").value

let cuello=parseInt(document.getElementById("cuello").value)
let tronco=parseInt(document.getElementById("tronco").value)
let piernas=parseInt(document.getElementById("piernas").value)

let brazoSup=parseInt(document.getElementById("brazoSup").value)
let brazoInf=parseInt(document.getElementById("brazoInf").value)
let muneca=parseInt(document.getElementById("muneca").value)

let carga=parseInt(document.getElementById("carga").value)
let actividad=parseInt(document.getElementById("actividad").value)

let scoreA=cuello+tronco+piernas+carga
let scoreB=brazoSup+brazoInf+muneca
let scoreC=Math.round((scoreA+scoreB)/2)

let reba=scoreC+actividad

let riesgo=""

if(reba<=3){
riesgo="Bajo"
}
else if(reba<=7){
riesgo="Medio"
}
else{
riesgo="Alto"
}

document.getElementById("resultado").innerHTML=

"<b>Tarea:</b> "+tarea+"<br>"+
"<b>Evaluador:</b> "+evaluador+"<br>"+
"<b>Fecha:</b> "+fecha

document.getElementById("a").innerHTML=scoreA
document.getElementById("b").innerHTML=scoreB
document.getElementById("c").innerHTML=scoreC
document.getElementById("r").innerHTML=reba
document.getElementById("nivel").innerHTML=riesgo

document.getElementById("tablaResumen").style.display="table"

let porcentaje=(reba/15)*100
document.getElementById("barraRiesgo").style.width=porcentaje+"%"

let barra=document.getElementById("barraRiesgo")


if(reba<=3){
riesgo="Bajo"
barra.style.background="green"
}
else if(reba<=7){
riesgo="Medio"
barra.style.background="orange"
}
else{
riesgo="Alto"
barra.style.background="red"
}
}

</script>

</body>
</html>
```
